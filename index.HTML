<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tasty Bites Restaurant</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header>

<h1>Tasty Bites</h1>

<nav>
<a href="#menu">Menu</a>
<a href="#gallery">Gallery</a>
<a href="#reservation">Reservation</a>
<a href="#location">Location</a>
</nav>

</header>

<section class="hero">

<div class="hero-text">

<h2>Delicious Food Made Fresh</h2>

<p>Enjoy the best meals in town</p>

<button onclick="orderNow()">Order Now</button>

</div>

</section>

<section id="menu">

<h2>Popular Dishes</h2>

<div class="menu-container">

<div class="card">
<img src="images/pizza.jpg">
<h3>Pizza</h3>
<p>$12</p>
</div>

<div class="card">
<img src="images/burger.jpg">
<h3>Burger</h3>
<p>$9</p>
</div>

<div class="card">
<img src="images/salad.jpg">
<h3>Salad</h3>
<p>$7</p>
</div>

</div>

</section>

<section id="gallery">

<h2>Food Gallery</h2>

<div class="gallery">

<img src="images/food1.jpg">
<img src="images/food2.jpg">
<img src="images/food3.jpg">
<img src="images/food4.jpg">

</div>

</section>

<section id="reservation">

<h2>Reserve a Table</h2>

<form>

<input type="text" placeholder="Name" required>

<input type="email" placeholder="Email" required>

<input type="date">

<input type="time">

<button type="submit">Book Table</button>

</form>

</section>

<section id="location">

<h2>Find Us</h2>

<iframe
src="https://www.google.com/maps?q=restaurant&output=embed"
width="100%"
height="350">
</iframe>

</section>

<footer>

<p>© 2026 Tasty Bites Restaurant</p>

</footer>

<script src="js/script.js"></script>

</body>
</html>
